{% extends 'base.html' %}

{% block title %}Выход из системы{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="bi bi-box-arrow-right"></i> Выход выполнен</h4>
            </div>
            <div class="card-body">
                <div class="mb-4">
                    <i class="bi bi-check-circle display-1 text-success"></i>
                </div>
                
                <h5>Вы успешно вышли из системы</h5>
                <p class="text-muted">Спасибо, что посетили наш сайт!</p>
                
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right"></i> Войти снова
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-house"></i> На главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
